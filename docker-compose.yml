version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fiora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fiora
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: fiora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:
