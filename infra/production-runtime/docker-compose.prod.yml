version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: fiora
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fiora_secure_password}
      POSTGRES_DB: fiora_os
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fiora -d fiora_os"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fiora_net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fiora_net

  gateway:
    build:
      context: ../../
      dockerfile: apps/gateway/Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://fiora:${DB_PASSWORD:-fiora_secure_password}@postgres:5432/fiora_os?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-super-secret-fiora-key}
      - FRONTEND_URL=http://localhost
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fiora_net

  agent-support:
    build:
      context: ../../
      dockerfile: services/agent-support/Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://fiora:${DB_PASSWORD:-fiora_secure_password}@postgres:5432/fiora_os?schema=public
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fiora_net

  dashboard:
    build:
      context: ../../
      dockerfile: apps/dashboard/Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_GATEWAY_URL=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - fiora_net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dashboard
      - gateway
    restart: unless-stopped
    networks:
      - fiora_net

volumes:
  postgres_data:
  redis_data:

networks:
  fiora_net:
    driver: bridge
